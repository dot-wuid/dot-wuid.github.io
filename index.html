<!DOCTYPE html>
<html>
<head>
    <title>.wuid's Github</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header>
        <h1>Dash</h1>
    </header>
    
    <section>
        <div style="max-width:600px;margin:30px auto;font-family:sans-serif;">
  <h3>Script Loader</h3>

  <button onclick="loadScript()" style="padding:8px 12px;margin-bottom:10px;">
    Load from GitHub
  </button>

  <button onclick="https://github.com/dot-wuid/dot-wuid.github.io/raw/refs/heads/main/copy.js" style="padding:8px 12px;margin-bottom:10px;">
    Copy Script
  </button>

  <span id="msg" style="margin-left:10px;font-size:12px;"></span>

  <pre id="output" style="background:#111;color:#0f0;padding:10px;white-space:pre-wrap;height:300px;overflow:auto;">
Click "Load from GitHub"
  </pre>
</div>

<script>
let scriptData = "";

async function loadScript(){
  const url = "https://github.com/dot-wuid/dot-wuid.github.io/raw/refs/heads/main/copy.js";

  try {
    const res = await fetch(url);
    scriptData = await res.text();

    document.getElementById("output").innerText = scriptData;
    document.getElementById("msg").innerText = "Loaded!";
  } catch (e) {
    document.getElementById("msg").innerText = "Failed to load script";
  }

  setTimeout(()=>document.getElementById("msg").innerText="",1500);
}

function copyScript(){
  if (!scriptData) return;

  navigator.clipboard.writeText(scriptData);
  document.getElementById("msg").innerText = "Copied!";

  setTimeout(()=>document.getElementById("msg").innerText="",1500);
}
</script>

  

    </section>

    <script src="script.js"></script>
</body>
</html>
